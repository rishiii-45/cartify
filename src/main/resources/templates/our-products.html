<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500&display=swap" rel="stylesheet">
    <title>Cartify</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            margin:0;
            padding-top:70px;
            background:#e9d5ff;
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
        }

        /* NAVBAR */
        .navbar{
            background:#6C5CE7;   /* purple navbar */
            color:white;
            padding:15px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .logo{
            font-size:24px;
            font-weight:bold;
        }

        .nav-links a{
            color:white;
            text-decoration:none;
            margin-left:20px;
            font-weight:bold;
        }

        .nav-links a:hover{
            opacity:0.8;
        }

        /* cart badge */
        .cart-count{
            background:white;
            padding:3px 8px;
            border-radius:50%;
            color:#6C5CE7;
            margin-left:5px;
            font-weight:bold;
        }

        /* PRODUCTS GRID */

        .container{
            padding:40px;
        }

        .products{
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
            gap:25px;
        }

        /* CARD */

        .card{
            background:white;
            padding:20px;
            border-radius:10px;
            text-align:center;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
            transition:0.3s;
            cursor:pointer;
        }

        .card:hover{
            transform:translateY(-8px);
            box-shadow:0 10px 25px rgba(79,70,229,0.4);
        }

        .card img{
            width:100%;
            height:200px;
            object-fit:cover;
            border-radius:8px;
        }

        /* price color (kept ecommerce-style red) */
        .price{
            color:#B12704;
            font-size:18px;
            font-weight:bold;
        }

        /* BUTTON */



        /* IMAGE BOX */

        .image-box{
            height:200px;
            display:flex;
            align-items:center;
            justify-content:center;
            background:#f8f8ff;
            border-radius:8px;
        }

        .image-box img{
            max-height:180px;
            max-width:100%;
            object-fit:contain;
        }

        .success-msg{
position:fixed;
top:80px;
left:50%;
transform:translateX(-50%);
background:#e8f8f1;
color:#1b7a4b;
padding:12px 20px;
border-radius:8px;
font-weight:600;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
animation:fadeIn 0.3s ease;
z-index:9999;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translate(-50%, -10px);
}
to{
opacity:1;
transform:translate(-50%, 0);
}
}

    </style>
</head>

<body>

<div th:replace="fragments/navbar :: navbar(${cartCount},${activePage})"></div>

<div th:if="${success}" class="success-msg" id="successMsg">
    ✓ Added to cart
</div>

<div class="container">

    <div class="products">

        <div class="card" th:each="p : ${products}">

            <div class="image-box">
                <img th:src="@{/admin/products/image/{id}(id=${p.id})}" style="
width:100%;
height:180px;
object-fit:contain;
transition:0.3s;
">
            </div>


            <h3 th:text="${p.name}" style="
font-family:'Poppins', sans-serif;
font-size:21px;
font-weight:600;
margin:10px 0 5px 0;
color:#1f1f1f;
"></h3>

            <p class="price">₹ <span th:text="${p.price}"></span></p>

            <form th:action="@{/cart/add/{id}(id=${p.id})}" method="post">
                <button style="
background:#1a0b3b;
color:white;
border:none;
padding:10px 22px;
border-radius:6px;
cursor:pointer;
transition:0.2s;
"
                        onmouseover="this.style.background='#6d28d9'"
                        onmouseout="this.style.background='#4c1d95'"
                >
                    Add to Cart
                </button>
            </form>

        </div>

    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>

<script>
    setTimeout(function(){
        let msg = document.getElementById("successMsg");
        if(msg){
            msg.style.transition = "opacity 0.5s";
            msg.style.opacity = "0";
            setTimeout(()=>msg.remove(),500);
        }
    },2000);
</script>

<script>
    document.addEventListener("DOMContentLoaded", function(){

    let msg = document.getElementById("successMsg");
    let badge = document.getElementById("cartBadge");

    if(msg && badge){
    setTimeout(()=>{
    badge.classList.add("cart-animate");
    },100);
    }

    });
</script>

</body>
</html>
