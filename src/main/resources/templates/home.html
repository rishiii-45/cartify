<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cartify</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            margin:0;
            background:#F4F3FF;   /* light purple background */
        }

        /* NAVBAR */
        .navbar{
            background:#6C5CE7;   /* purple navbar */
            color:white;
            padding:15px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .logo{
            font-size:24px;
            font-weight:bold;
        }

        .nav-links a{
            color:white;
            text-decoration:none;
            margin-left:20px;
            font-weight:bold;
        }

        .nav-links a:hover{
            opacity:0.8;
        }

        /* cart badge */
        .cart-count{
            background:white;
            padding:3px 8px;
            border-radius:50%;
            color:#6C5CE7;
            margin-left:5px;
            font-weight:bold;
        }

        /* PRODUCTS GRID */

        .container{
            padding:40px;
        }

        .products{
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
            gap:25px;
        }

        /* CARD */

        .card{
            background:white;
            padding:20px;
            border-radius:10px;
            text-align:center;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-8px);
            box-shadow:0 8px 20px rgba(0,0,0,0.15);
        }

        .card img{
            width:100%;
            height:200px;
            object-fit:cover;
            border-radius:8px;
        }

        /* price color (kept ecommerce-style red) */
        .price{
            color:#B12704;
            font-size:18px;
            font-weight:bold;
        }

        /* BUTTON */

        button{
            background:#6C5CE7;   /* purple button */
            color:white;
            border:none;
            padding:10px 18px;
            border-radius:5px;
            cursor:pointer;
            font-weight:bold;
        }

        button:hover{
            background:#5A4BD6;   /* darker purple */
        }

        /* IMAGE BOX */

        .image-box{
            height:200px;
            display:flex;
            align-items:center;
            justify-content:center;
            background:#f8f8ff;
            border-radius:8px;
        }

        .image-box img{
            max-height:180px;
            max-width:100%;
            object-fit:contain;
        }

    </style>
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container">

    <div class="products">

        <div class="card" th:each="p : ${products}">

            <div class="image-box">
                <img th:src="@{/admin/products/image/{id}(id=${p.id})}">
            </div>


            <h3 th:text="${p.name}"></h3>

            <p class="price">₹ <span th:text="${p.price}"></span></p>

            <form th:action="@{/cart/add/{id}(id=${p.id})}" method="post">
                <button>Add to Cart</button>
            </form>

        </div>

    </div>
</div>

</body>
</html>
