<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Order Successful</title>

    <style>
        body{
            font-family: Arial;
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:white;
            padding:40px;
            border-radius:12px;
            text-align:center;
            box-shadow:0 5px 15px rgba(0,0,0,0.15);
            width:400px;
        }

        h1{
            color:#28a745;
        }

        a{
            display:inline-block;
            margin-top:20px;
            padding:10px 18px;
            background:#6C5CE7;
            color:white;
            text-decoration:none;
            border-radius:6px;
        }

        a:hover{
            background:#5A4BD6;
        }
    </style>
</head>

<body>

<div class="box">

    <h1>✅ Order Placed!</h1>

    <p>Your order has been placed successfully.</p>
    <p>Thank you for shopping with <b>Cartify</b>.</p>

    <a href="/">Continue Shopping</a>

</div>

</body>
</html>
