<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Product</title>

    <style>
        body{
            font-family: Arial;
            background:#f5f5f5;
        }

        .container{
            width:400px;
            margin:50px auto;
            background:white;
            padding:25px;
            border-radius:8px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
        }

        button{
            background:#ff6b00;
            color:white;
            border:none;
            padding:10px;
            width:100%;
            cursor:pointer;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Add Product</h2>

    <form th:action="@{/admin/products/save}"
          th:object="${product}"
          method="post"
          enctype="multipart/form-data">

        <input type="hidden" th:field="*{id}">

        <input type="text" th:field="*{name}" placeholder="Product Name" required>

        <input type="number" step="0.01" th:field="*{price}" placeholder="Price" required>

        <input type="file" name="imageFile">

        <button type="submit">Save</button>

    </form>

</div>

</body>
</html>
