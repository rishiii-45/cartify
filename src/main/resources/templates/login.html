<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cartify Login</title>

    <style>
        body{
background: linear-gradient(135deg,#f3e8ff,#e9d5ff,#ddd6fe);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Poppins,sans-serif;
}

        .container{
        background:white;
        padding:30px;
        box-shadow:0 10px 40px rgba(0,0,0,0.15);
border-radius:12px;
        width:300px;
        }

        h2{
        text-align:center;
        margin-bottom:20px;
        }

        input{
        width:100%;
        padding:10px;
        margin:10px 0;
        border:1px solid #ccc;
        border-radius:5px;
        }

        button{
        width:100%;
        padding:10px;
        background:#4CAF50;
        border:none;
        color:white;
        border-radius:5px;
        cursor:pointer;
        }

        a{
        display:block;
        text-align:center;
        margin-top:10px;
        }
    </style>

</head>

<body>

<div class="container">
    <h2>Login</h2>

    <p th:if="${error}" th:text="${error}" style="color:red;"></p>

    <form action="/login" method="post">

        <input type="email" name="email" placeholder="Email" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>

    </form>



</div>

</body>
</html>
