<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cartify Signup</title>

    <style>
        body{
background: linear-gradient(135deg,#f3e8ff,#e9d5ff,#ddd6fe);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Poppins,sans-serif;
}

        .container{
        background:white;
        padding:30px;
        width:320px;
        box-shadow:0 10px 40px rgba(0,0,0,0.15);
border-radius:12px;
        }

        h2{
        text-align:center;
        }

        input{
        width:100%;
        padding:10px;
        margin:10px 0;
        border-radius:5px;
        border:1px solid #ccc;
        }

        button{
        width:100%;
        padding:10px;
        background:#2196F3;
        border:none;
        color:white;
        border-radius:5px;
        cursor:pointer;
        }
    </style>

</head>

<body>

<div class="container">

    <h2>Create your Cartify Account</h2>

    <p th:if="${error}" th:text="${error}" style="color:red;" ></p>
    <form action="/signup" method="post">


        <input type="text" name="name" placeholder="Name" required>


        <input type="email" name="email" placeholder="Email ID" required>


        <input type="password" name="password" placeholder="Password" required>


        <input type="password" name="confirmPassword" placeholder="Confirm Password" required>

        <button type="submit">Sign Up</button>

    </form>

    <p style="margin-top:15px;font-size:14px;text-align:center;">
        Already a user?
        <a href="/login" style="color:#6d28d9;font-weight:600;text-decoration:none;">
            Login
        </a>
    </p>
</div>

</body>
</html>
